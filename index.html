<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RubriCon Hub - Gestión de Rúbricas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="app"></div>

    <script>
        const STORAGE_KEY = 'rubricon_db_v6';
        
        let appState = {
            view: 'home',
            templates: [],
            activeRubric: null,
            evalData: { student: '', course: '', scores: {}, currentIndex: 0, isDone: false },
            lastReport: null
        };

        function init() {
            loadTemplates();
            render();
        }

        function loadTemplates() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                appState.templates = JSON.parse(saved);
            } else {
                appState.templates = [
                    {
                        id: 'seed-1',
                        title: 'Proyecto Energía Eólica',
                        level: '1m',
                        type: 'project',
                        evaluations: [],
                        data: [
                            { id: 'p1', category: 'Conceptos', indicator: 'Concepto de fuerza motriz', levels: [{points: 3, label: 'Logrado', desc: 'Excelente'}, {points: 2, label: 'En Proceso', desc: 'Bien'}, {points: 1, label: 'Inicial', desc: 'Necesita mejora'}] },
                            { id: 'p2', category: 'Diseño', indicator: 'Esquema técnico', levels: [{points: 3, label: 'Logrado', desc: 'Excelente'}, {points: 2, label: 'En Proceso', desc: 'Bien'}, {points: 1, label: 'Inicial', desc: 'Necesita mejora'}] },
                            { id: 'p3', category: 'Construcción', indicator: 'Construcción correcta', levels: [{points: 3, label: 'Logrado', desc: 'Excelente'}, {points: 2, label: 'En Proceso', desc: 'Bien'}, {points: 1, label: 'Inicial', desc: 'Necesita mejora'}] }
                        ]
                    }
                ];
            }
        }

        function saveTemplates() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState.templates));
        }

        function render() {
            const app = document.getElementById('app');
            
            if (appState.view === 'home') {
                app.innerHTML = renderHome();
            } else if (appState.view === 'evaluator') {
                app.innerHTML = renderEvaluator();
            } else if (appState.view === 'history') {
                app.innerHTML = renderHistory();
            } else if (appState.view === 'report') {
                app.innerHTML = renderReport();
            }
            
            attachListeners();
        }

        function renderHome() {
            return `
                <div class="min-h-screen">
                    <div class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 text-white py-20 px-8">
                        <div class="max-w-6xl mx-auto">
                            <h1 class="text-6xl font-black mb-4">RubriCon Hub</h1>
                            <p class="text-indigo-200 text-lg">Gestión inteligente de rúbricas y evaluación de estudiantes</p>
                        </div>
                    </div>
                    
                    <div class="max-w-6xl mx-auto p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <div class="btn-new-rubric bg-white border-2 border-dashed border-indigo-200 rounded-3xl p-10 flex flex-col items-center justify-center cursor-pointer hover:border-indigo-400 transition shadow-sm">
                            <div class="text-4xl mb-4">📝</div>
                            <h3 class="text-2xl font-black text-indigo-900">Nueva Rúbrica</h3>
                            <p class="text-xs text-indigo-500 font-bold mt-2">Crear rápido</p>
                        </div>

                        ${appState.templates.map((t, idx) => `
                            <div class="bg-white border rounded-3xl p-8 shadow-sm hover:shadow-xl transition">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="text-3xl">${t.type === 'project' ? '📚' : '⚡'}</div>
                                    <button class="btn-view-history p-2 bg-slate-100 rounded hover:bg-indigo-600 hover:text-white transition" data-idx="${idx}">👁️</button>
                                </div>
                                <h3 class="font-black text-xl text-slate-800 mb-2">${t.title}</h3>
                                <p class="text-xs text-slate-500 mb-4">${t.level} • ${t.type === 'project' ? 'Proyecto' : 'Ágil'}</p>
                                <p class="text-xs text-slate-400 mb-6">✓ ${t.evaluations?.length || 0} estudiantes</p>
                                <button class="btn-start-eval w-full py-3 rounded-xl font-bold text-white transition ${t.type === 'project' ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-emerald-600 hover:bg-emerald-700'}" data-idx="${idx}">
                                    Evaluar →
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderEvaluator() {
            const r = appState.activeRubric;
            const e = appState.evalData;
            const current = r.data[e.currentIndex];
            const progress = ((e.currentIndex + 1) / r.data.length) * 100;

            if (e.isDone) {
                return `
                    <div class="min-h-screen bg-slate-50 p-8 flex items-center justify-center">
                        <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
                            <div class="text-6xl text-center mb-6">✓</div>
                            <h2 class="text-3xl font-black text-center mb-8">Evaluación Completa</h2>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 mb-2">Estudiante</label>
                                    <input id="student-name" class="w-full p-3 border border-slate-200 rounded-lg" placeholder="Nombre">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 mb-2">Curso</label>
                                    <input id="student-course" class="w-full p-3 border border-slate-200 rounded-lg" placeholder="Ej. 1° Medio A">
                                </div>
                                <button class="btn-finalize w-full bg-slate-900 text-white font-black py-3 rounded-lg hover:bg-indigo-600 transition">
                                    Generar Reporte PDF
                                </button>
                                <button class="btn-back w-full bg-slate-100 text-slate-600 font-bold py-3 rounded-lg hover:bg-slate-200 transition">
                                    ← Volver
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="min-h-screen bg-slate-50 flex flex-col">
                    <div class="h-2 bg-slate-200"><div class="h-full bg-indigo-600 transition-all" style="width: ${progress}%"></div></div>
                    
                    <div class="px-8 py-4 bg-white border-b flex justify-between items-center shadow-sm">
                        <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded text-xs font-bold">${e.currentIndex + 1} / ${r.data.length}</span>
                        <h2 class="font-black text-slate-800">${r.title}</h2>
                        <button class="btn-close-eval text-slate-400 hover:text-slate-600 text-2xl">✕</button>
                    </div>

                    <div class="flex-1 p-8 lg:p-20 flex flex-col justify-center">
                        <div class="max-w-2xl mx-auto w-full">
                            <div class="text-center mb-12">
                                <h3 class="text-4xl font-black text-slate-900">${current.indicator}</h3>
                                <p class="text-xs text-slate-500 mt-4">${current.category}</p>
                            </div>

                            <div class="grid grid-cols-1 gap-4">
                                ${current.levels.map(lvl => {
                                    const isSelected = e.scores[current.id] === lvl.points;
                                    return `
                                        <button class="btn-score p-6 border-2 rounded-2xl text-left transition ${isSelected ? 'border-indigo-600 bg-indigo-50' : 'border-slate-200 hover:border-indigo-300'}" data-id="${current.id}" data-points="${lvl.points}">
                                            <div class="flex justify-between items-center mb-2">
                                                <span class="text-lg font-black uppercase">${lvl.label}</span>
                                                <span class="text-xs font-bold px-3 py-1 rounded bg-slate-100">${lvl.points} pts</span>
                                            </div>
                                            <p class="text-sm text-slate-600">${lvl.desc}</p>
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHistory() {
            const r = appState.activeRubric;
            return `
                <div class="min-h-screen bg-slate-50">
                    <div class="bg-white border-b px-8 py-6 flex justify-between items-center shadow-sm">
                        <button class="btn-back-home text-slate-500 font-bold hover:text-indigo-600">← Volver</button>
                        <h2 class="font-black text-xl">${r.title}</h2>
                        <div></div>
                    </div>

                    <div class="max-w-5xl mx-auto p-10">
                        <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
                            <table class="w-full">
                                <thead class="bg-slate-50 border-b">
                                    <tr class="text-xs font-bold text-slate-400">
                                        <th class="px-8 py-5 text-left">Estudiante</th>
                                        <th class="px-8 py-5 text-left">Curso</th>
                                        <th class="px-8 py-5 text-left">Fecha</th>
                                        <th class="px-8 py-5 text-left">Nota</th>
                                        <th class="px-8 py-5 text-right">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${(r.evaluations || []).length === 0 ? `
                                        <tr>
                                            <td colspan="5" class="px-8 py-12 text-center text-slate-400 font-medium">No hay evaluaciones</td>
                                        </tr>
                                    ` : (r.evaluations || []).map((ev, idx) => `
                                        <tr class="border-b hover:bg-slate-50">
                                            <td class="px-8 py-5 font-bold">${ev.student}</td>
                                            <td class="px-8 py-5 text-slate-600">${ev.course}</td>
                                            <td class="px-8 py-5 text-xs text-slate-500">${ev.date}</td>
                                            <td class="px-8 py-5 font-black text-lg ${parseFloat(ev.grade) >= 4 ? 'text-emerald-600' : 'text-rose-600'}">${ev.grade}</td>
                                            <td class="px-8 py-5 text-right">
                                                <button class="btn-view-report p-2 bg-indigo-100 text-indigo-700 rounded hover:bg-indigo-600 hover:text-white transition" data-idx="${idx}">👁️</button>
                                                <button class="btn-delete-eval p-2 bg-rose-100 text-rose-600 rounded hover:bg-rose-600 hover:text-white transition ml-2" data-idx="${idx}">🗑️</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderReport() {
            const r = appState.lastReport;
            const grade = parseFloat(r.grade);
            const themeClass = grade >= 6 ? 'text-indigo-700' : grade >= 4 ? 'text-emerald-700' : 'text-rose-600';

            return `
                <div class="min-h-screen bg-slate-100 p-8">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex gap-4 mb-8">
                            <button class="btn-back-history px-6 py-3 bg-white text-slate-600 font-bold rounded-lg hover:bg-slate-100 transition">← Historial</button>
                            <button class="btn-print-pdf px-6 py-3 bg-slate-900 text-white font-bold rounded-lg hover:bg-indigo-600 transition">🖨️ Descargar PDF</button>
                        </div>

                        <div id="pdf-render" class="bg-white p-12 rounded-lg shadow-lg">
                            <div class="border-b pb-8 mb-8">
                                <h1 class="text-4xl font-black">${r.rubric.title}</h1>
                                <p class="text-slate-600 mt-2">Fecha: ${r.date}</p>
                            </div>

                            <div class="grid grid-cols-2 gap-8 mb-8">
                                <div class="border rounded-lg p-6">
                                    <p class="text-xs font-bold text-slate-400 mb-2">ESTUDIANTE</p>
                                    <p class="text-3xl font-black">${r.student}</p>
                                    <p class="text-slate-600">${r.course}</p>
                                </div>
                                <div class="border rounded-lg p-6 text-center">
                                    <p class="text-xs font-bold text-slate-400 mb-2">CALIFICACIÓN</p>
                                    <p class="text-6xl font-black ${themeClass}">${r.grade}</p>
                                    <p class="text-xs text-slate-500 mt-2">${r.score} / ${r.max} pts</p>
                                </div>
                            </div>

                            <div class="mb-8 p-4 bg-slate-50 rounded-lg border">
                                <p class="text-sm font-bold text-slate-700">Puntaje total: ${r.score} de ${r.max} puntos</p>
                            </div>

                            <div class="border-t pt-8">
                                <h3 class="text-lg font-black mb-6">Matriz de Evaluación</h3>
                                <div class="space-y-3">
                                    ${r.rubric.data.map(ind => {
                                        const pts = r.detail[ind.id] || 0;
                                        const maxPts = Math.max(...ind.levels.map(l => l.points));
                                        const label = ind.levels.find(l => l.points === pts)?.label || 'Sin datos';
                                        return `
                                            <div class="p-4 border rounded-lg bg-slate-50">
                                                <div class="flex justify-between items-start">
                                                    <div>
                                                        <p class="font-bold">${ind.indicator}</p>
                                                        <p class="text-xs text-slate-500">${ind.category}</p>
                                                    </div>
                                                    <div class="text-right">
                                                        <p class="font-bold">${label}</p>
                                                        <p class="text-xs text-slate-500">${pts} / ${maxPts}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>

                            <div class="mt-12 pt-8 border-t text-center text-xs text-slate-400">
                                <p>Generado vía RubriCon - Documento Oficial</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function attachListeners() {
            // Home
            document.querySelector('.btn-new-rubric')?.addEventListener('click', () => {
                appState.activeRubric = appState.templates[0];
                appState.evalData = { student: '', course: '', scores: {}, currentIndex: 0, isDone: false };
                appState.view = 'evaluator';
                render();
            });

            document.querySelectorAll('.btn-start-eval').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    appState.activeRubric = appState.templates[idx];
                    appState.evalData = { student: '', course: '', scores: {}, currentIndex: 0, isDone: false };
                    appState.view = 'evaluator';
                    render();
                });
            });

            document.querySelectorAll('.btn-view-history').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    appState.activeRubric = appState.templates[idx];
                    appState.view = 'history';
                    render();
                });
            });

            // Evaluator
            document.querySelectorAll('.btn-score').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.dataset.id;
                    const points = parseInt(e.currentTarget.dataset.points);
                    appState.evalData.scores[id] = points;

                    if (appState.evalData.currentIndex < appState.activeRubric.data.length - 1) {
                        appState.evalData.currentIndex++;
                    } else {
                        appState.evalData.isDone = true;
                    }
                    render();
                });
            });

            document.querySelector('.btn-close-eval')?.addEventListener('click', () => {
                appState.view = 'home';
                render();
            });

            document.querySelector('.btn-finalize')?.addEventListener('click', () => {
                const student = document.getElementById('student-name')?.value || 'Estudiante';
                const course = document.getElementById('student-course')?.value || 'N/A';

                const max = appState.activeRubric.data.length * 3;
                const score = Object.values(appState.evalData.scores).reduce((a, b) => a + b, 0);
                const grade = (score / max * 7).toFixed(1);

                const result = {
                    id: Date.now().toString(),
                    student,
                    course,
                    score,
                    max,
                    grade,
                    detail: appState.evalData.scores,
                    date: new Date().toLocaleDateString('es-ES')
                };

                const rubricIdx = appState.templates.findIndex(t => t.id === appState.activeRubric.id);
                appState.templates[rubricIdx].evaluations.push(result);
                saveTemplates();

                appState.lastReport = { rubric: appState.activeRubric, ...result };
                appState.view = 'report';
                render();
            });

            // History
            document.querySelector('.btn-back-home')?.addEventListener('click', () => {
                appState.view = 'home';
                render();
            });

            document.querySelectorAll('.btn-view-report').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    const ev = appState.activeRubric.evaluations[idx];
                    appState.lastReport = { rubric: appState.activeRubric, ...ev };
                    appState.view = 'report';
                    render();
                });
            });

            document.querySelectorAll('.btn-delete-eval').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    if (confirm('¿Eliminar?')) {
                        const rubricIdx = appState.templates.findIndex(t => t.id === appState.activeRubric.id);
                        appState.templates[rubricIdx].evaluations.splice(idx, 1);
                        saveTemplates();
                        render();
                    }
                });
            });

            // Report
            document.querySelector('.btn-back-history')?.addEventListener('click', () => {
                appState.view = 'history';
                render();
            });

            document.querySelector('.btn-print-pdf')?.addEventListener('click', () => {
                const element = document.getElementById('pdf-render');
                const opt = {
                    margin: 10,
                    filename: `Reporte_${appState.lastReport.student}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                window.html2pdf().set(opt).from(element).save();
            });

            document.querySelectorAll('.btn-back')?.forEach(btn => {
                btn.addEventListener('click', () => {
                    appState.view = 'home';
                    render();
                });
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
